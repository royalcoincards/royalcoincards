<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
<defs>
  <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#F5E6B8"/>
    <stop offset="30%" stop-color="#E4C46E"/>
    <stop offset="60%" stop-color="#C9A84C"/>
    <stop offset="100%" stop-color="#9A7A2E"/>
  </linearGradient>
  <linearGradient id="gold2" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#F0D878"/>
    <stop offset="50%" stop-color="#C9A84C"/>
    <stop offset="100%" stop-color="#8A6820"/>
  </linearGradient>
  <linearGradient id="gold3" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#F5E6B8"/>
    <stop offset="50%" stop-color="#C9A84C"/>
    <stop offset="100%" stop-color="#F5E6B8"/>
  </linearGradient>
</defs>

<!-- ── CROWN ── -->
<g transform="translate(200,20)">
  <!-- Crown base band -->
  <rect x="-52" y="52" width="104" height="18" rx="2" fill="url(#gold2)"/>
  <!-- Crown arch top -->
  <path d="M-52,52 Q-30,38 0,36 Q30,38 52,52 Z" fill="url(#gold2)"/>
  <!-- Left spike -->
  <polygon points="-48,52 -52,14 -44,14 -38,42" fill="url(#gold2)"/>
  <!-- Left-mid spike -->
  <polygon points="-22,52 -26,6 -18,6 -14,42" fill="url(#gold2)"/>
  <!-- Center spike tall -->
  <polygon points="-10,52 -8,-4 8,-4 10,52" fill="url(#gold2)"/>
  <!-- Right-mid spike -->
  <polygon points="22,52 18,6 26,6 30,42" fill="url(#gold2)"/>
  <!-- Right spike -->
  <polygon points="48,52 44,14 52,14 38,42" fill="url(#gold2)"/>
  <!-- Crown orb top center -->
  <circle cx="0" cy="-8" r="7" fill="url(#gold)" stroke="#F5E6B8" stroke-width="1"/>
  <circle cx="0" cy="-8" r="4" fill="#F5E6B8" opacity="0.9"/>
  <!-- Fleur-de-lis on center spike top -->
  <ellipse cx="0" cy="-18" rx="4" ry="6" fill="url(#gold2)"/>
  <ellipse cx="-7" cy="-14" rx="3" ry="5" fill="url(#gold2)" transform="rotate(-25,-7,-14)"/>
  <ellipse cx="7" cy="-14" rx="3" ry="5" fill="url(#gold2)" transform="rotate(25,7,-14)"/>
  <!-- Gems on base band -->
  <ellipse cx="-36" cy="57" rx="4" ry="5" fill="#F5E6B8" opacity="0.9"/>
  <ellipse cx="-18" cy="56" rx="4" ry="5" fill="#F5E6B8" opacity="0.9"/>
  <ellipse cx="0" cy="56" rx="4.5" ry="5.5" fill="#F5E6B8" opacity="0.9"/>
  <ellipse cx="18" cy="56" rx="4" ry="5" fill="#F5E6B8" opacity="0.9"/>
  <ellipse cx="36" cy="57" rx="4" ry="5" fill="#F5E6B8" opacity="0.9"/>
  <!-- Dot accents on spikes -->
  <circle cx="-48" cy="18" r="3" fill="#F5E6B8" opacity="0.8"/>
  <circle cx="-24" cy="10" r="3" fill="#F5E6B8" opacity="0.8"/>
  <circle cx="24" cy="10" r="3" fill="#F5E6B8" opacity="0.8"/>
  <circle cx="48" cy="18" r="3" fill="#F5E6B8" opacity="0.8"/>
</g>

<!-- ── SHIELD ── -->
<!-- Main shield outline -->
<path d="M200,105 L284,120 L284,230 Q284,290 200,330 Q116,290 116,230 L116,120 Z"
  fill="none" stroke="url(#gold)" stroke-width="4"/>
<!-- Shield inner border -->
<path d="M200,113 L276,127 L276,228 Q276,282 200,320 Q124,282 124,228 L124,127 Z"
  fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
<!-- Shield fill (dark) -->
<path d="M200,107 L282,122 L282,230 Q282,288 200,328 Q118,288 118,230 L118,122 Z"
  fill="#050810" opacity="0.6"/>

<!-- Shield inner decorative frame -->
<path d="M200,120 L270,133 L270,228 Q270,278 200,314 Q130,278 130,228 L130,133 Z"
  fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.3"/>

<!-- ── RCC LETTERS inside shield ── -->
<!-- R -->
<g transform="translate(144,165)">
  <rect x="0" y="0" width="9" height="52" rx="2" fill="url(#gold)"/>
  <path d="M9,0 Q34,0 34,14 Q34,26 9,28 Z" fill="url(#gold)"/>
  <path d="M9,28 L34,28 L34,32 Q34,34 32,34 L26,34 L9,52 L9,44 L24,30 L9,30 Z" fill="url(#gold)"/>
</g>
<!-- C -->
<g transform="translate(184,165)">
  <path d="M28,5 Q8,5 4,18 Q0,26 0,26 Q0,36 4,40 Q8,51 28,51"
    stroke="url(#gold)" stroke-width="9" fill="none" stroke-linecap="round"/>
</g>
<!-- C -->
<g transform="translate(218,165)">
  <path d="M28,5 Q8,5 4,18 Q0,26 0,26 Q0,36 4,40 Q8,51 28,51"
    stroke="url(#gold)" stroke-width="9" fill="none" stroke-linecap="round"/>
</g>

<!-- Thin line under RCC -->
<line x1="152" y1="225" x2="248" y2="225" stroke="url(#gold3)" stroke-width="1" opacity="0.7"/>
<!-- Star below line -->
<polygon points="200,232 202,238 208,238 203,242 205,248 200,244 195,248 197,242 192,238 198,238"
  fill="url(#gold)" opacity="0.8"/>

<!-- ── LEFT LAUREL BRANCH ── -->
<g fill="url(#gold)" opacity="0.85">
  <!-- Stem -->
  <path d="M116,218 Q90,210 70,195" stroke="url(#gold)" stroke-width="2" fill="none"/>
  <!-- Leaves left side (going up) -->
  <ellipse cx="108" cy="215" rx="9" ry="5" transform="rotate(-20,108,215)"/>
  <ellipse cx="99" cy="210" rx="9" ry="5" transform="rotate(-30,99,210)"/>
  <ellipse cx="90" cy="204" rx="9" ry="5" transform="rotate(-40,90,204)"/>
  <ellipse cx="82" cy="197" rx="8" ry="4.5" transform="rotate(-50,82,197)"/>
  <ellipse cx="75" cy="190" rx="7" ry="4" transform="rotate(-60,75,190)"/>
  <ellipse cx="70" cy="182" rx="7" ry="4" transform="rotate(-70,70,182)"/>
  <!-- Leaves right side of stem -->
  <ellipse cx="113" cy="208" rx="9" ry="5" transform="rotate(15,113,208)"/>
  <ellipse cx="104" cy="202" rx="9" ry="5" transform="rotate(5,104,202)"/>
  <ellipse cx="95" cy="196" rx="8" ry="5" transform="rotate(-5,95,196)"/>
  <ellipse cx="87" cy="189" rx="8" ry="4.5" transform="rotate(-15,87,189)"/>
  <ellipse cx="79" cy="182" rx="7" ry="4" transform="rotate(-25,79,182)"/>
  <!-- Berry cluster at tip -->
  <circle cx="67" cy="177" r="4.5" fill="url(#gold)"/>
  <circle cx="62" cy="172" r="3.5" fill="url(#gold)"/>
  <circle cx="71" cy="171" r="3" fill="url(#gold)"/>
</g>

<!-- ── RIGHT LAUREL BRANCH ── -->
<g fill="url(#gold)" opacity="0.85">
  <!-- Stem -->
  <path d="M284,218 Q310,210 330,195" stroke="url(#gold)" stroke-width="2" fill="none"/>
  <!-- Leaves right side (going up) -->
  <ellipse cx="292" cy="215" rx="9" ry="5" transform="rotate(20,292,215)"/>
  <ellipse cx="301" cy="210" rx="9" ry="5" transform="rotate(30,301,210)"/>
  <ellipse cx="310" cy="204" rx="9" ry="5" transform="rotate(40,310,204)"/>
  <ellipse cx="318" cy="197" rx="8" ry="4.5" transform="rotate(50,318,197)"/>
  <ellipse cx="325" cy="190" rx="7" ry="4" transform="rotate(60,325,190)"/>
  <ellipse cx="330" cy="182" rx="7" ry="4" transform="rotate(70,330,182)"/>
  <!-- Leaves left side of stem -->
  <ellipse cx="287" cy="208" rx="9" ry="5" transform="rotate(-15,287,208)"/>
  <ellipse cx="296" cy="202" rx="9" ry="5" transform="rotate(-5,296,202)"/>
  <ellipse cx="305" cy="196" rx="8" ry="5" transform="rotate(5,305,196)"/>
  <ellipse cx="313" cy="189" rx="8" ry="4.5" transform="rotate(15,313,189)"/>
  <ellipse cx="321" cy="182" rx="7" ry="4" transform="rotate(25,321,182)"/>
  <!-- Berry cluster at tip -->
  <circle cx="333" cy="177" r="4.5" fill="url(#gold)"/>
  <circle cx="338" cy="172" r="3.5" fill="url(#gold)"/>
  <circle cx="329" cy="171" r="3" fill="url(#gold)"/>
</g>

<!-- ── TEXT: ROYAL COIN CARDS ── -->
<text x="200" y="368" font-family="Georgia, 'Times New Roman', serif"
  font-size="30" font-weight="700" fill="url(#gold3)"
  text-anchor="middle" letter-spacing="6">ROYAL COIN CARDS</text>

<!-- Thin decorative line under name -->
<line x1="80" y1="376" x2="320" y2="376" stroke="url(#gold3)" stroke-width="0.8" opacity="0.5"/>

<!-- Diamond ornament center of line -->
<polygon points="200,373 203,376 200,379 197,376" fill="url(#gold)"/>

<!-- ── TAGLINE ── -->
<text x="200" y="395" font-family="Georgia, 'Times New Roman', serif"
  font-size="10" fill="#C9A84C"
  text-anchor="middle" letter-spacing="3" opacity="0.8">PREMIUM PACKAGING. PRECIOUS TRUST.</text>

</svg>
