<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E6B8"/>
      <stop offset="40%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#9A7A2E"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E4C46E"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer hexagon -->
  <polygon points="100,8 182,52 182,148 100,192 18,148 18,52"
    fill="none" stroke="url(#goldGrad)" stroke-width="2" filter="url(#glow)" opacity="0.8"/>

  <!-- Inner hexagon -->
  <polygon points="100,22 168,60 168,140 100,178 32,140 32,60"
    fill="#080C20" stroke="url(#goldGrad)" stroke-width="1" opacity="0.5"/>

  <!-- Decorative inner ring -->
  <polygon points="100,32 158,67 158,133 100,168 42,133 42,67"
    fill="none" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.3"/>

  <!-- Crown at top -->
  <g fill="url(#goldGrad)" transform="translate(100,48)" filter="url(#glow)">
    <!-- Crown base -->
    <rect x="-22" y="8" width="44" height="7" rx="1"/>
    <!-- Crown points -->
    <polygon points="-22,8 -18,-4 -12,4 -6,-8 0,4 6,-8 12,4 18,-4 22,8"/>
    <!-- Crown jewels -->
    <circle cx="-6" cy="-4" r="2.5" fill="#F5E6B8"/>
    <circle cx="0" cy="-6" r="3" fill="#F5E6B8"/>
    <circle cx="6" cy="-4" r="2.5" fill="#F5E6B8"/>
  </g>

  <!-- Coin circle -->
  <circle cx="100" cy="106" r="34" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
  <circle cx="100" cy="106" r="28" fill="rgba(201,168,76,0.06)" stroke="url(#goldGrad)" stroke-width="0.5"/>

  <!-- RCC Letters -->
  <text x="100" y="100" font-family="Georgia, serif" font-size="11" font-weight="700"
    fill="url(#goldGrad)" text-anchor="middle" letter-spacing="3">RCC</text>

  <!-- Horizontal line under letters -->
  <line x1="80" y1="104" x2="120" y2="104" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.6"/>

  <!-- Small text inside coin -->
  <text x="100" y="115" font-family="Georgia, serif" font-size="5.5"
    fill="#C9A84C" text-anchor="middle" letter-spacing="1" opacity="0.8">COIN CARDS</text>

  <!-- Small star at bottom of coin -->
  <polygon points="100,122 101.5,127 106,127 102.5,130 103.8,135 100,132 96.2,135 97.5,130 94,127 98.5,127"
    fill="url(#goldGrad)" transform="scale(0.6) translate(67,78)"/>

  <!-- Left laurel -->
  <g stroke="url(#goldGrad)" stroke-width="1" fill="none" opacity="0.7">
    <path d="M 52,106 Q 46,98 50,90"/>
    <path d="M 52,106 Q 44,104 44,96"/>
    <path d="M 52,106 Q 44,112 46,120"/>
    <path d="M 52,106 Q 48,118 52,124"/>
    <ellipse cx="50" cy="90" rx="5" ry="8" transform="rotate(-20,50,90)" fill="rgba(201,168,76,0.15)"/>
    <ellipse cx="44" cy="96" rx="5" ry="8" transform="rotate(-30,44,96)" fill="rgba(201,168,76,0.15)"/>
    <ellipse cx="46" cy="120" rx="5" ry="8" transform="rotate(20,46,120)" fill="rgba(201,168,76,0.15)"/>
    <ellipse cx="52" cy="126" rx="5" ry="8" transform="rotate(10,52,126)" fill="rgba(201,168,76,0.15)"/>
  </g>

  <!-- Right laurel -->
  <g stroke="url(#goldGrad)" stroke-width="1" fill="none" opacity="0.7">
    <path d="M 148,106 Q 154,98 150,90"/>
    <path d="M 148,106 Q 156,104 156,96"/>
    <path d="M 148,106 Q 156,112 154,120"/>
    <path d="M 148,106 Q 152,118 148,124"/>
    <ellipse cx="150" cy="90" rx="5" ry="8" transform="rotate(20,150,90)" fill="rgba(201,168,76,0.15)"/>
    <ellipse cx="156" cy="96" rx="5" ry="8" transform="rotate(30,156,96)" fill="rgba(201,168,76,0.15)"/>
    <ellipse cx="154" cy="120" rx="5" ry="8" transform="rotate(-20,154,120)" fill="rgba(201,168,76,0.15)"/>
    <ellipse cx="148" cy="126" rx="5" ry="8" transform="rotate(-10,148,126)" fill="rgba(201,168,76,0.15)"/>
  </g>

  <!-- Bottom decorative dots -->
  <circle cx="88" cy="170" r="1.5" fill="url(#goldGrad)" opacity="0.6"/>
  <circle cx="100" cy="173" r="2" fill="url(#goldGrad)" opacity="0.8"/>
  <circle cx="112" cy="170" r="1.5" fill="url(#goldGrad)" opacity="0.6"/>

  <!-- Corner ornaments -->
  <g fill="url(#goldGrad)" opacity="0.4">
    <circle cx="100" cy="10" r="2"/>
    <circle cx="180" cy="54" r="2"/>
    <circle cx="180" cy="146" r="2"/>
    <circle cx="100" cy="190" r="2"/>
    <circle cx="20" cy="146" r="2"/>
    <circle cx="20" cy="54" r="2"/>
  </g>
</svg>
